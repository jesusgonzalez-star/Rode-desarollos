    <script>
    let estadoCCs  = [];
    let estadoJefs = [];

    function toast(msg, esError) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast show' + (esError ? ' error' : '');
        setTimeout(() => { el.className = 'toast'; }, 2500);
    }

    function bloquear(b) {
        document.querySelectorAll('button, input').forEach(el => el.disabled = b);
    }

    // ─── CC ──────────────────────────────────────────────────────────────────

    function renderCC(lista) {
        estadoCCs = lista || [];
        const cont = document.getElementById('lista_cc');
        if (!estadoCCs.length) {
            cont.innerHTML = '<p style="font-size:10px;color:#94a3b8;padding:8px 12px;">Sin centros de costo registrados.</p>';
            return;
        }
        cont.innerHTML = estadoCCs.map((cc, i) => `
            <div class="lista-item" id="cc_row_${i}">
                <span class="val">${cc}</span>
                <button class="btn-icono edit" onclick="editarCC(${i})" title="Editar">
                    <span class="material-symbols-outlined">edit</span>
                </button>
                <button class="btn-icono del" onclick="eliminarCC(${i})" title="Eliminar">
                    <span class="material-symbols-outlined">delete</span>
                </button>
            </div>
        `).join('');
    }

    function editarCC(i) {
        const row = document.getElementById('cc_row_' + i);
        const val = estadoCCs[i];
        row.innerHTML = `
            <input type="text" class="input-inline" id="edit_cc_${i}" value="${val}" style="text-transform:uppercase;">
            <button class="btn-save-inline" onclick="confirmarEditCC(${i}, '${val}')">Guardar</button>
            <button class="btn-cancel-inline" onclick="renderCC(estadoCCs)">Cancelar</button>
        `;
        document.getElementById('edit_cc_' + i).focus();
    }

    function confirmarEditCC(i, viejo) {
        const nuevo = document.getElementById('edit_cc_' + i).value.trim().toUpperCase();
        if (!nuevo) { toast('Ingresa un valor', true); return; }
        if (nuevo === viejo) { renderCC(estadoCCs); return; }
        bloquear(true);
        google.script.run
            .withSuccessHandler(() => {
                estadoCCs[i] = nuevo;
                renderCC(estadoCCs);
                toast('CC actualizado');
                bloquear(false);
            })
            .withFailureHandler(e => { toast(e.message || 'Error', true); bloquear(false); })
            .actualizarCC(viejo, nuevo);
    }

    function eliminarCC(i) {
        if (!confirm('¿Eliminar "' + estadoCCs[i] + '"?')) return;
        const viejo = estadoCCs[i];
        bloquear(true);
        google.script.run
            .withSuccessHandler(() => {
                estadoCCs.splice(i, 1);
                renderCC(estadoCCs);
                toast('CC eliminado');
                bloquear(false);
            })
            .withFailureHandler(e => { toast(e.message || 'Error', true); bloquear(false); })
            .actualizarCC(viejo, '');
    }

    function mostrarFormCC() {
        document.getElementById('form_cc_nuevo').style.display = 'flex';
        document.getElementById('input_cc_nuevo').focus();
    }
    function cancelarFormCC() {
        document.getElementById('form_cc_nuevo').style.display = 'none';
        document.getElementById('input_cc_nuevo').value = '';
    }
    function guardarNuevoCC() {
        const val = document.getElementById('input_cc_nuevo').value.trim().toUpperCase();
        if (!val) { toast('Ingresa un valor', true); return; }
        if (estadoCCs.includes(val)) { toast('Ya existe', true); return; }
        bloquear(true);
        google.script.run
            .withSuccessHandler(() => {
                estadoCCs.push(val);
                estadoCCs.sort();
                cancelarFormCC();
                renderCC(estadoCCs);
                toast('CC agregado');
                bloquear(false);
            })
            .withFailureHandler(e => { toast(e.message || 'Error', true); bloquear(false); })
            .actualizarCC(null, val);
    }

    // ─── JEFATURAS ───────────────────────────────────────────────────────────

    function renderJef(lista) {
        estadoJefs = lista || [];
        const cont = document.getElementById('lista_jef');
        if (!estadoJefs.length) {
            cont.innerHTML = '<p style="font-size:10px;color:#94a3b8;padding:8px 12px;">Sin jefaturas registradas.</p>';
            return;
        }
        cont.innerHTML = estadoJefs.map((j, i) => `
            <div class="lista-item" id="jef_row_${i}">
                <span class="val">${j.nombre}</span>
                <button class="btn-icono edit" onclick="editarJef(${i})" title="Editar">
                    <span class="material-symbols-outlined">edit</span>
                </button>
                <button class="btn-icono del" onclick="eliminarJef(${i})" title="Eliminar">
                    <span class="material-symbols-outlined">delete</span>
                </button>
            </div>
        `).join('');
    }

    function editarJef(i) {
        const row = document.getElementById('jef_row_' + i);
        const j = estadoJefs[i];
        row.innerHTML = `
            <input type="text" class="input-inline" id="edit_jef_nom_${i}" value="${j.nombre}" placeholder="NOMBRE" style="text-transform:uppercase;min-width:160px;">
            <button class="btn-save-inline" onclick="confirmarEditJef(${i})">Guardar</button>
            <button class="btn-cancel-inline" onclick="renderJef(estadoJefs)">Cancelar</button>
        `;
        document.getElementById('edit_jef_nom_' + i).focus();
    }

    function confirmarEditJef(i) {
        const vNombre = estadoJefs[i].nombre;
        const vCargo  = estadoJefs[i].cargo || '';
        const nNombre = document.getElementById('edit_jef_nom_' + i).value.trim().toUpperCase();
        const nCargo  = vCargo;
        if (!nNombre) { toast('Ingresa nombre', true); return; }
        bloquear(true);
        google.script.run
            .withSuccessHandler(() => {
                estadoJefs[i] = { nombre: nNombre, cargo: nCargo };
                estadoJefs.sort((a,b) => a.nombre.localeCompare(b.nombre));
                renderJef(estadoJefs);
                toast('Jefatura actualizada');
                bloquear(false);
            })
            .withFailureHandler(e => { toast(e.message || 'Error', true); bloquear(false); })
            .actualizarJefatura(vNombre, vCargo, nNombre, nCargo);
    }

    function eliminarJef(i) {
        const j = estadoJefs[i];
        if (!confirm('¿Eliminar "' + j.nombre + '"?')) return;
        bloquear(true);
        google.script.run
            .withSuccessHandler(() => {
                estadoJefs.splice(i, 1);
                renderJef(estadoJefs);
                toast('Jefatura eliminada');
                bloquear(false);
            })
            .withFailureHandler(e => { toast(e.message || 'Error', true); bloquear(false); })
            .actualizarJefatura(j.nombre, j.cargo || '', '', '');
    }

    function mostrarFormJef() {
        document.getElementById('form_jef_nuevo').style.display = 'flex';
        document.getElementById('input_jef_nombre').focus();
    }
    function cancelarFormJef() {
        document.getElementById('form_jef_nuevo').style.display = 'none';
        document.getElementById('input_jef_nombre').value = '';
    }
    function guardarNuevaJef() {
        const nombre = document.getElementById('input_jef_nombre').value.trim().toUpperCase();
        const cargo  = '';
        if (!nombre) { toast('Ingresa nombre', true); return; }
        bloquear(true);
        google.script.run
            .withSuccessHandler(() => {
                estadoJefs.push({ nombre, cargo });
                estadoJefs.sort((a,b) => a.nombre.localeCompare(b.nombre));
                cancelarFormJef();
                renderJef(estadoJefs);
                toast('Jefatura agregada');
                bloquear(false);
            })
            .withFailureHandler(e => { toast(e.message || 'Error', true); bloquear(false); })
            .actualizarJefatura(null, null, nombre, cargo);
    }

    // ─── USUARIOS ────────────────────────────────────────────────────────────

    const ROLES = ['RRHH', 'ADMIN', 'RRLL', 'REC Y SEL'];

    function selectRoles(selId, valorActual) {
        return ROLES.map(r =>
            `<option value="${r}" ${r === valorActual ? 'selected' : ''}>${r}</option>`
        ).join('');
    }

    let estadoUsrs = [];

    function renderUsr(lista) {
        estadoUsrs = lista || [];
        const cont = document.getElementById('lista_usr');
        if (!estadoUsrs.length) {
            cont.innerHTML = '<p style="font-size:10px;color:#94a3b8;padding:8px 12px;">Sin usuarios registrados.</p>';
            return;
        }
        cont.innerHTML = estadoUsrs.map((u, i) => `
            <div class="lista-item" id="usr_row_${i}">
                <span class="val" style="text-transform:none;">${u.email}</span>
                <span style="font-size:9px;font-weight:900;color:#0D7DAF;background:#e0f0fa;padding:2px 8px;margin-right:4px;">${u.rol}</span>
                <button class="btn-icono edit" onclick="editarUsr(${i})" title="Editar">
                    <span class="material-symbols-outlined">edit</span>
                </button>
                <button class="btn-icono del" onclick="eliminarUsr(${i})" title="Eliminar">
                    <span class="material-symbols-outlined">delete</span>
                </button>
            </div>
        `).join('');
    }

    function editarUsr(i) {
        const row = document.getElementById('usr_row_' + i);
        const u = estadoUsrs[i];
        row.innerHTML = `
            <input type="email" class="input-inline" id="edit_usr_email_${i}" value="${u.email}" style="min-width:220px;text-transform:none;">
            <select class="input-inline" id="edit_usr_rol_${i}" style="min-width:140px;">${selectRoles('', u.rol)}</select>
            <button class="btn-save-inline" onclick="confirmarEditUsr(${i})">Guardar</button>
            <button class="btn-cancel-inline" onclick="renderUsr(estadoUsrs)">Cancelar</button>
        `;
        document.getElementById('edit_usr_email_' + i).focus();
    }

    function confirmarEditUsr(i) {
        const vEmail = estadoUsrs[i].email;
        const nEmail = document.getElementById('edit_usr_email_' + i).value.trim().toLowerCase();
        const nRol   = document.getElementById('edit_usr_rol_' + i).value;
        if (!nEmail) { toast('Ingresa un correo', true); return; }
        bloquear(true);
        google.script.run
            .withSuccessHandler(() => {
                estadoUsrs[i] = { email: nEmail, rol: nRol };
                renderUsr(estadoUsrs);
                toast('Usuario actualizado');
                bloquear(false);
            })
            .withFailureHandler(e => { toast(e.message || 'Error', true); bloquear(false); })
            .actualizarUsuarioRol(vEmail, nEmail, nRol);
    }

    function eliminarUsr(i) {
        if (!confirm('¿Eliminar "' + estadoUsrs[i].email + '"?')) return;
        const vEmail = estadoUsrs[i].email;
        bloquear(true);
        google.script.run
            .withSuccessHandler(() => {
                estadoUsrs.splice(i, 1);
                renderUsr(estadoUsrs);
                toast('Usuario eliminado');
                bloquear(false);
            })
            .withFailureHandler(e => { toast(e.message || 'Error', true); bloquear(false); })
            .actualizarUsuarioRol(vEmail, null, null);
    }

    function mostrarFormUsr() {
        document.getElementById('form_usr_nuevo').style.display = 'flex';
        document.getElementById('input_usr_email').focus();
    }
    function cancelarFormUsr() {
        document.getElementById('form_usr_nuevo').style.display = 'none';
        document.getElementById('input_usr_email').value = '';
        document.getElementById('input_usr_rol').value = 'RRHH';
    }
    function guardarNuevoUsr() {
        const email = document.getElementById('input_usr_email').value.trim().toLowerCase();
        const rol   = document.getElementById('input_usr_rol').value;
        if (!email) { toast('Ingresa un correo', true); return; }
        if (estadoUsrs.find(u => u.email === email)) { toast('Ya existe', true); return; }
        bloquear(true);
        google.script.run
            .withSuccessHandler(() => {
                estadoUsrs.push({ email, rol });
                estadoUsrs.sort((a,b) => a.email.localeCompare(b.email));
                cancelarFormUsr();
                renderUsr(estadoUsrs);
                toast('Usuario agregado');
                bloquear(false);
            })
            .withFailureHandler(e => { toast(e.message || 'Error', true); bloquear(false); })
            .actualizarUsuarioRol(null, email, rol);
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────
    window.onload = () => {
        google.script.run
            .withSuccessHandler(d => {
                if (d.error) { toast(d.error, true); }
                renderCC(d.ccs || []);
                renderJef(d.jefaturas || []);
                document.getElementById('loadingOverlay').style.display = 'none';
            })
            .withFailureHandler(e => {
                toast(e.message || 'Error al cargar', true);
                document.getElementById('loadingOverlay').style.display = 'none';
            })
            .obtenerConfigListas();

        google.script.run
            .withSuccessHandler(d => {
                if (d.error) { toast(d.error, true); return; }
                renderUsr(d.usuarios || []);
            })
            .withFailureHandler(e => toast(e.message || 'Error usuarios', true))
            .obtenerUsuariosRoles();
    };
    </script>
</body>
</html>
