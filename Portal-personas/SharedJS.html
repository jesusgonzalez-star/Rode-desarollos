<script>
    // ─── UTILIDADES ─────────────────────────────────────────────────────────────

    function formatearPeso(input) {
        const pos = input.selectionStart;
        const prevLen = input.value.length;
        const raw = input.value.replace(/[^\d]/g, '');
        if (!raw) { input.value = ''; return; }
        input.value = parseInt(raw, 10).toLocaleString('es-CL');
        // Mantener posición del cursor
        const newLen = input.value.length;
        input.setSelectionRange(pos + (newLen - prevLen), pos + (newLen - prevLen));
    }

    function parsePeso(input) {
        return parseInt((input?.value || '0').replace(/[^\d]/g, '') || '0', 10) || 0;
    }

    function soloRut(e) {
        const key = e.key;
        if (key === "Enter" || key === "Backspace" || key === "Tab") return true;
        if (!/^[0-9kK]$/.test(key)) { e.preventDefault(); return false; }
        const valorLimpio = e.target.value.replace(/[^0-9kK]/g, '');
        if (valorLimpio.length >= 9) { e.preventDefault(); return false; }
    }

    function formatearRut(i) {
        let v = i.value.replace(/[^0-9kK]/g, '').toUpperCase();
        if (v.length > 9) v = v.slice(0, 9);
        if (v.length < 2) { i.value = v; return; }
        let cuerpo = v.slice(0, -1);
        let dv = v.slice(-1);
        i.value = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, ".") + "-" + dv;
    }

    function validarRut(i, feedbackId) {
        let v = i.value.replace(/\./g, '').replace(/-/g, '');
        if (v.length < 8) { i.style.borderColor = ''; const f = document.getElementById(feedbackId); if (f) f.innerText = ''; return; }
        let c = v.slice(0, -1), d = v.slice(-1).toUpperCase(), s = 0, m = 2;
        for (let j = 1; j <= c.length; j++) { s += m * v.charAt(c.length - j); m = (m < 7) ? m + 1 : 2; }
        let de = 11 - (s % 11); de = (de == 11) ? 0 : (de == 10) ? "K" : de;
        const f = document.getElementById(feedbackId);
        if (f) {
            if (d != de) { i.style.borderColor = 'red'; f.innerText = "❌ RUT INVÁLIDO"; f.style.color = 'red'; }
            else { i.style.borderColor = '#10b981'; f.innerText = "✅ RUT VÁLIDO"; f.style.color = '#10b981'; }
        }
    }

    function formatearPesos(i) {
        let v = i.value.replace(/\D/g, "");
        if (v === "") { i.value = ""; return; }
        i.value = Number(v).toLocaleString('es-CL');
    }

    function calcularCostoEmpresa() {
        const sueldoInput = document.querySelector('input[name="sueldoLiquido"]');
        const costoInput = document.querySelector('input[name="costoEmpresa"]');
        if (!sueldoInput || !costoInput) return;
        let sueldo = parseInt(sueldoInput.value.replace(/\D/g, ''));
        if (isNaN(sueldo)) { costoInput.value = ""; return; }
        let costo = 0;
        if (sueldo >= 500000 && sueldo <= 1500000) costo = Math.round(sueldo * 1.25);
        else if (sueldo > 1500000 && sueldo <= 4000000) costo = Math.round(sueldo * 1.45);
        costoInput.value = costo > 0 ? costo.toLocaleString('es-CL') : "";
    }

    function getBase64(file) {
        return new Promise((resolve, reject) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });
    }

    function fill(id, l) {
        let s = document.getElementById(id); if (!s) return;
        s.innerHTML = '<option value="">SELECCIONE...</option>';
        if (l) l.forEach(i => {
            let text = i.toUpperCase();
            if (text.length > 100) text = text.substring(0, 100) + '...';
            s.innerHTML += '<option value="' + i + '" title="' + i.toUpperCase() + '">' + text + '</option>';
        });
    }

    function fillR(id, l, n) {
        let c = document.getElementById(id); if (!c) return;
        c.innerHTML = "";
        if (l) l.forEach((item, x) => {
            const d = document.createElement('div'); d.className = "check-item";
            d.innerHTML = '<input type="radio" name="' + n + '" id="' + n + '_' + x + '" value="' + item + '" required><label for="' + n + '_' + x + '">' + item.toUpperCase() + '</label>';
            c.appendChild(d);
        });
    }

    // ─── PROGRESS BAR ────────────────────────────────────────────────────────────

    function updateProgress() {
        const activeForm = document.querySelector('form');
        if (!activeForm) return;
        const fields = activeForm.querySelectorAll('[required]');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        if (fields.length === 0) { if (progressBar) progressBar.style.width = "0%"; return; }
        const groups = new Set();
        fields.forEach(f => {
            if (f.type === 'radio' || f.type === 'checkbox') groups.add(f.name);
            else groups.add(f.id || f.name || f.placeholder);
        });
        let filled = 0;
        groups.forEach(name => {
            const radios = activeForm.querySelectorAll(`input[name="${name}"][type="radio"]`);
            if (radios.length > 0) { if (Array.from(radios).some(r => r.checked)) filled++; }
            else { const field = activeForm.querySelector(`[name="${name}"], [id="${name}"]`); if (field && field.value.trim() !== "") filled++; }
        });
        const porc = Math.round((filled / groups.size) * 100);
        if (progressBar) progressBar.style.width = porc + "%";
        if (progressText) progressText.innerText = porc + "% COMPLETADO";
    }

    document.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('main');
        if (form) { form.addEventListener('input', updateProgress); form.addEventListener('change', updateProgress); }
        updateProgress();
    });

    // ─── FORM-SPECIFIC TOGGLE FUNCTIONS ──────────────────────────────────────────

    function handleMotivoCargo(v) {
        const s = document.getElementById('cargoSelect');
        const i = document.getElementById('cargoInput');
        const l = document.getElementById('lblCargo');
        if (!s || !i) return;
        if (v === 'NUEVO CARGO') {
            s.classList.add('hidden'); s.required = false;
            i.classList.remove('hidden'); i.required = true;
            if (l) l.innerText = "Cargo a cubrir (NUEVO CARGO)";
        } else {
            s.classList.remove('hidden'); s.required = true;
            i.classList.add('hidden'); i.required = false;
            if (l) l.innerText = "Cargo a cubrir";
        }
        updateProgress();
    }

    function toggleDescriptorFile(v) {
        const c = document.getElementById('containerDescriptorFile');
        const f = document.getElementById('fileDescriptor');
        if (!c || !f) return;
        if (v === 'SI') { c.classList.remove('hidden'); f.required = true; }
        else { c.classList.add('hidden'); f.required = false; f.value = ""; }
        updateProgress();
    }

    function toggleFechaTermino(v) {
        const container = document.getElementById('containerFechaTermino');
        const inputT = document.getElementById('fechaTermino');
        const inputI = document.getElementById('fechaInicio');
        if (!container || !inputT) return;
        if (v === "PLAZO FIJO") {
            container.classList.remove('hidden');
            inputT.required = true;
            if (inputI) inputI.required = true;
        } else {
            container.classList.add('hidden');
            inputT.required = false;
            inputT.value = "";
            if (inputI) {
                inputI.required = false;
                inputI.value = "";
            }
        }
    }

    function togglePlanSalud(v) {
        const p = document.getElementById('cont_planSalud');
        if (!p) return;
        if (v === 'FONASA') { p.value = 'N/A'; p.style.opacity = '0.5'; p.readOnly = true; }
        else { p.value = ''; p.style.opacity = '1'; p.readOnly = false; }
    }

    function toggleTeletrabajo(v, containerId) {
        const c = document.getElementById(containerId);
        if (!c) return;
        if (v && v.toUpperCase().includes('PARCIAL')) { c.classList.remove('hidden'); }
        else { c.classList.add('hidden'); c.querySelectorAll('input[type="checkbox"]').forEach(chk => chk.checked = false); }
        if (typeof updateProgress === 'function') updateProgress();
    }

    function calcularHorasExtras() {
        const inicio = document.querySelector('input[name="hex_horaInicio"]');
        const fin = document.querySelector('input[name="hex_horaFin"]');
        const display = document.getElementById('hex_horasCalculadas');
        const hidden = document.getElementById('hex_horasExtra');

        if (!inicio || !fin || !display || !hidden) return;
        if (!inicio.value || !fin.value) { display.innerText = "0.0"; hidden.value = "0.0"; return; }

        const [hI, mI] = inicio.value.split(':').map(Number);
        const [hF, mF] = fin.value.split(':').map(Number);
        const minutosInicio = hI * 60 + mI;
        const minutosFin = hF * 60 + mF;
        let diferencia = minutosFin - minutosInicio;

        if (diferencia < 0) diferencia += 24 * 60;

        const horas = (diferencia / 60).toFixed(1);
        display.innerText = horas;
        hidden.value = horas;
    }

    let dominiosRespaldo = [];
    function toggleCorreo(v) {
        const d = document.getElementById('dominio');
        if (!d) return;
        if (v == "NO") { d.innerHTML = '<option>SIN CORREO</option>'; d.disabled = true; d.required = false; }
        else { d.disabled = false; d.required = true; fill('dominio', dominiosRespaldo); }
    }

    // ─── EVALUACIÓN PROMEDIOS ────────────────────────────────────────────────────

    function initEvaluacion() {
        const form = document.getElementById('formEvaluacion');
        if (!form) return;
        form.querySelectorAll('input[type="radio"]').forEach(rad => rad.addEventListener('change', updateEvaAverages));
    }

    function updateEvaAverages() {
        const calcSection = (prefix, total) => {
            let sum = 0, count = 0;
            for (let i = 1; i <= total; i++) {
                const val = document.querySelector(`input[name="eva_${prefix}${i}"]:checked`);
                const obs = document.querySelector(`input[name="eva_${prefix}${i}_obs"]`);
                if (val) {
                    if (parseInt(val.value) > 0) {
                        sum += parseInt(val.value);
                        count++;
                        if (obs) { obs.disabled = false; obs.style.opacity = '1'; }
                    } else {
                        if (obs) { obs.disabled = true; obs.value = ""; obs.style.opacity = '0.5'; }
                    }
                }
            }
            return count > 0 ? (sum / count).toFixed(1) : "0.0";
        };
        const pAsp = calcSection('asp', 14);
        const pProf = calcSection('prof', 7);
        const pSeg = calcSection('seg', 6);
        const pCal = calcSection('cal', 7);
        const setV = (id1, id2, val) => {
            const d = document.getElementById(id1); if (d) d.innerText = val;
            const h = document.getElementById(id2); if (h) h.value = val;
        };
        setV('eva_promedio_display', 'eva_promedio', pAsp);
        setV('res_prom_pers', 'eva_promedio', pAsp);
        setV('eva_promedio_prof_display', 'eva_promedio_prof', pProf);
        setV('res_prom_prof', 'eva_promedio_prof', pProf);
        setV('eva_promedio_seg_display', 'eva_promedio_seg', pSeg);
        setV('res_prom_seg', 'eva_promedio_seg', pSeg);
        setV('eva_promedio_cal_display', 'eva_promedio_cal', pCal);
        setV('res_prom_cal', 'eva_promedio_cal', pCal);
        const final = ((parseFloat(pAsp) + parseFloat(pProf) + parseFloat(pSeg) + parseFloat(pCal)) / 4).toFixed(1);
        const fd = document.getElementById('eva_puntuacion_final_display'); if (fd) fd.innerText = final;
        const fh = document.getElementById('eva_puntuacion_final'); if (fh) fh.value = final;
    }

    function handleMotivoMod(motivo) {
        const m = (motivo || "").toUpperCase();
        const show = (id, visible) => {
            const el = document.getElementById(id);
            if (el) {
                visible ? el.classList.remove('hidden') : el.classList.add('hidden');
                const inputs = el.querySelectorAll('input, select');
                inputs.forEach(i => {
                    if (visible) {
                        // Solo poner required a lo que no sea checkbox
                        if (i.type !== 'checkbox') i.required = true;
                    } else {
                        i.required = false;
                        if (i.type === 'checkbox') i.checked = false;
                        else if (i.tagName === 'SELECT') i.selectedIndex = 0;
                        else i.value = "";
                    }
                });
            }
        };
        const isGeneral = m.includes('GENERAL');
        const isCargo = isGeneral || m.includes('CARGO') || m.includes('ASCENSO') || m.includes('PROMOCIÓN');
        const isCc = isGeneral || m.includes('CENTRO') || m.includes('COSTO');
        const isSueldo = isGeneral || m.includes('SUELDO') || m.includes('RENTA') || m.includes('SALARIO') || m.includes('REMUNERACIÓN');
        const isJornada = isGeneral || m.includes('JORNADA') || m.includes('HORARIO');
        show('wrapper_mod_cargo_ant', isCargo);
        show('wrapper_mod_cargo_nuev', isCargo);
        show('wrapper_mod_sueldo_ant', isSueldo);
        show('wrapper_mod_sueldo_nuev', isSueldo);
        show('wrapper_mod_cc_ant', isCc);
        show('wrapper_mod_cc_nuev', isCc);
        show('wrapper_mod_jornada_ant', isJornada);
        show('wrapper_mod_jornada_nuev', isJornada);
        
        // Sincronizar CC Actual con CC Anterior si el motivo involucra CC
        if (isCc) {
            const actual = document.getElementById('mod_ccActual');
            const ant = document.getElementById('mod_ccAnterior');
            if (actual && ant && actual.value) ant.value = actual.value;
        }
        
        if (typeof updateProgress === 'function') updateProgress();
    }

    // ─── MODAL ───────────────────────────────────────────────────────────────────

    function abrirModal(formId, tipo) {
        const globalNombre = document.getElementById('global_nombreSolicitante');
        const globalEmail = document.getElementById('global_emailSolicitante');
        if (globalNombre || globalEmail) {
            if (!globalNombre || !globalNombre.value.trim() || !globalEmail || !globalEmail.value.trim() || !globalEmail.checkValidity()) {
                if (globalNombre) globalNombre.reportValidity();
                if (globalEmail) globalEmail.reportValidity();
                alert("Por favor, complete los Datos del Solicitante correctamente.");
                return;
            }
        }
        const f = document.getElementById(formId);
        if (!f || !f.checkValidity()) { if (f) f.reportValidity(); return; }

        const allLabels = {
            'RECLUTAMIENTO': { cargoSolicitante: "CARGO SOLICITANTE", tipoIngreso: "MOTIVO CONTRATACIÓN", estudiosVacante: "ESTUDIOS/PROFESIÓN", cargo: "CARGO A CUBRIR", descriptorCargo: "DESCRIPTOR CARGO", sueldoLiquido: "SUELDO LÍQUIDO", costoEmpresa: "COSTO EMPRESA", cc: "CENTRO DE COSTO", cartaOferta: "CARTA OFERTA", presupuesto: "PRESUPUESTO", jefeAprobador: "JEFE APROBADOR", necesitaCorreo: "REQUIERE CORREO", tipoContrato: "TIPO CONTRATO", fechaInicio: "FECHA INICIO", fechaTermino: "FECHA TÉRMINO" },
            'CONTRATACIÓN': { cont_nombreCandidato: "NOMBRE CANDIDATO", cont_rut: "RUT", cont_nacionalidad: "NACIONALIDAD", cont_estadoCivil: "ESTADO CIVIL", cont_direccion: "DIRECCIÓN", cont_telefono: "TELÉFONO", cont_correo: "CORREO", cont_horario: "HORARIO", cont_fechaIngreso: "FECHA INGRESO", cont_afp: "AFP", cont_salud: "SALUD", cont_planSalud: "PLAN SALUD", cont_familiarEmpresa: "FAMILIAR EMPRESA", cont_vbLaboral: "V°B° LABORAL", cont_certDiscapacidad: "CERT. DISCAPACIDAD", cont_doc_observaciones: "OBS. DOCUMENTOS" },
            'MODIFICACIÓN DE CONDICIONES': { mod_nombre: "NOMBRE TRABAJADOR", mod_motivo: "MOTIVO", mod_nuevoCargo: "NUEVO CARGO", mod_vigencia: "VIGENCIA", mod_sueldoAnterior: "SUELDO ANT.", mod_ccAnterior: "CC ANT.", mod_sueldoNuevo: "SUELDO NUEVO", mod_ccNuevo: "CC NUEVO", mod_jefeDirecto: "JEFE DIRECTO", mod_fechaJefe: "FECHA JEFE", mod_superintendente: "SUPERINTENDENTE", mod_fechaSuper: "FECHA SUPER", mod_gerente: "GERENTE", mod_fechaGerente: "FECHA GERENTE", mod_observaciones: "OBSERVACIONES" },
            'SOLICITUD DE PERMISO': { perm_nombre: "NOMBRE TRABAJADOR", perm_rut: "RUT", perm_fechaIngreso: "FECHA INGRESO", perm_cc: "CENTRO DE COSTO", perm_cargo: "CARGO", perm_jefe: "JEFE DIRECTO", perm_fechaInicio: "FECHA INICIO", perm_fechaFin: "FECHA FIN", perm_observacion: "OBSERVACIONES" },
            'REVOCACIÓN CARTA DE AVISO': { rev_nombre: "NOMBRE TRABAJADOR", rev_rut: "RUT", rev_fechaOriginal: "FECHA AVISO ORIGINAL", rev_motivo: "MOTIVO", rev_cargoSolicitante: "CARGO SOLICITANTE", rev_ccSolicitante: "C.C. SOLICITANTE" },
            'EVALUACIÓN DE PERSONAL A DESVINCULAR': { eva_nombre: "NOMBRE TRABAJADOR", eva_rut: "RUT", eva_correoPersonal: "CORREO PERSONAL", eva_cargo: "CARGO", eva_area: "ÁREA", eva_ccEvaluador: "C.C. EVALUADOR", eva_fTermino: "FECHA TÉRMINO", eva_motivo: "MOTIVO", eva_formularioSalida: "FORMULARIO DE SALIDA", eva_puntuacion_final: "PUNTUACIÓN FINAL", eva_nombreEvaluador: "EVALUADOR", eva_cargoEvaluador: "CARGO EVALUADOR", eva_recomienda: "RECOMIENDA", eva_obs1: "OBSERVACIONES 1", eva_obs2: "OBSERVACIONES 2", eva_implementos: "IMPLEMENTOS" },
            'PACTO HORAS EXTRAORDINARIAS': { hex_nombre: "NOMBRE TRABAJADOR", hex_rut: "RUT", hex_fechaContrato: "FECHA CONTRATO", hex_area: "ÁREA", hex_jefeDirecto: "JEFE DIRECTO", hex_fecha: "DÍA DEL PACTO", hex_horaInicio: "DESDE LAS", hex_horaFin: "HASTA LAS", hex_horasExtra: "TOTAL HORAS", hex_descripcion: "DESCRIPCIÓN ACTIVIDAD" },
            'FINIQUITO': { fin_nombre: "NOMBRE TRABAJADOR", fin_rut: "RUT", fin_cargo: "CARGO", fin_centroCosto: "CENTRO DE COSTO", fin_fechaInicio: "FECHA INICIO", fin_fechaTermino: "FECHA TÉRMINO", fin_causal: "CAUSAL" }
        };

        // Para FINIQUITO, agregar resumen de totales calculados al modal
        if (tipo === 'FINIQUITO') {
            const gi = (id) => document.getElementById(id);
            const docTxt = (id) => gi(id)?.textContent || '—';
            const docVal = (id) => gi(id)?.value || '—';
            const labels = allLabels['FINIQUITO'];
            const formData = new FormData(f);
            let h = '';
            formData.forEach((v, k) => { if (v && v !== 'N/A' && labels[k]) h += `<div><span class='text-slate-400 text-[8px]'>${labels[k]}:</span><br><b>${v.toUpperCase()}</b></div>`; });
            h += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0;grid-column:span 2"><span class='text-slate-400 text-[8px]'>ANTIGÜEDAD:</span><br><b>${docVal('fin_aniosServicio')}</b></div>`;
            h += `<div><span class='text-slate-400 text-[8px]'>VACACIONES PROP.:</span><br><b>${docTxt('fin_habVacaciones')}</b></div>`;
            h += `<div><span class='text-slate-400 text-[8px]'>INDEMNIZACIÓN IAS:</span><br><b>${docTxt('fin_habIndemnizacion')}</b></div>`;
            h += `<div><span class='text-slate-400 text-[8px]'>ACUERDO MARCO:</span><br><b>${docTxt('fin_habAcuerdo')}</b></div>`;
            h += `<div><span class='text-slate-400 text-[8px]'>MES DE AVISO:</span><br><b>${docTxt('fin_habMesAviso')}</b></div>`;
            h += `<div style="background:#0D7DAF;color:white;padding:6px;grid-column:span 2"><span style="font-size:7px;opacity:0.8">TOTAL A PAGAR</span><br><b style="font-size:14px">${docTxt('fin_totalPagar')}</b></div>`;
            document.getElementById('resumen').innerHTML = h;
            const m = document.getElementById('modalConfirm');
            m.classList.remove('hidden'); m.classList.add('flex');
            document.getElementById('btnFinal').onclick = () => enviarSolicitud(tipo, formId);
            return;
        }

        const labels = allLabels[tipo] || {};
        const formData = new FormData(f);
        const collected = {};
        formData.forEach((v, k) => { if (!collected[k]) collected[k] = []; collected[k].push(v); });

        let h = "";
        for (let k in collected) {
            const val = collected[k].join(", ");
            if (val && val !== "N/A") {
                const label = labels[k] || k.toUpperCase();
                h += "<div><span class='text-slate-400 text-[8px]'>" + label + ":</span><br><b>" + val + "</b></div>";
            }
        }

        document.getElementById('resumen').innerHTML = h;
        const m = document.getElementById('modalConfirm');
        m.classList.remove('hidden'); m.classList.add('flex');
        document.getElementById('btnFinal').onclick = () => enviarSolicitud(tipo, formId);
    }

    function cerrarModal() {
        const m = document.getElementById('modalConfirm');
        if (m) { m.classList.add('hidden'); m.classList.remove('flex'); }
        const pr = document.getElementById('panelResumen');
        if (pr) pr.classList.remove('hidden');
        const pe = document.getElementById('panelExito');
        if (pe) { pe.classList.add('hidden'); pe.classList.remove('flex'); }
    }

    // ─── ENVÍO PRINCIPAL ─────────────────────────────────────────────────────────

    async function enviarSolicitud(tipo, formId) {
        const b = document.getElementById('btnFinal');
        b.disabled = true; b.innerText = "PROCESANDO...";
        const f = document.getElementById(formId);

        try {
            const getRad = (nom) => { const el = f.elements[nom]; return el instanceof RadioNodeList ? el.value : (el ? el.value : "N/A"); };
            const getChk = (nom) => f.elements[nom] && f.elements[nom].checked ? "SI" : "NO";
            const getValue = (nom) => f.elements[nom] ? f.elements[nom].value.toUpperCase() : "N/A";

            let data = {
                tipoFormulario: tipo,
                nombreSolicitante: (document.getElementById('global_nombreSolicitante') || {}).value?.toUpperCase().trim() || "N/A",
                emailSolicitante: (document.getElementById('global_emailSolicitante') || {}).value?.toLowerCase().trim() || "N/A"
            };

            if (tipo === 'RECLUTAMIENTO') {
                const fileInput = document.getElementById('fileDescriptor');
                if (fileInput && fileInput.files.length > 0) { data.fileB64 = await getBase64(fileInput.files[0]); data.fileName = fileInput.files[0].name; }
                Object.assign(data, {
                    cargoSolicitante: getValue('cargoSolicitante'), ccSolicitante: getValue('ccSolicitante'),
                    tipoIngreso: getRad('tipoIngreso'), cantidadVacantes: f.cantidadVacantes ? f.cantidadVacantes.value : "1",
                    estudiosVacante: getValue('estudiosVacante'),
                    cargo: (getRad('tipoIngreso') === 'NUEVO CARGO') ? getValue('cargo_manual') : getValue('cargo'),
                    descriptorCargo: getRad('descriptorCargo'), sueldoLiquido: f.sueldoLiquido.value,
                    costoEmpresa: f.costoEmpresa.value, cc: f.cc.value,
                    cartaOferta: getRad('cartaOferta'), presupuesto: getRad('presupuesto'),
                    jefeAprobador: f.jefeAprobador ? f.jefeAprobador.value : "",
                    necesitaCorreo: getRad('necesitaCorreo'), tipoContrato: getRad('tipoContrato'),
                    fechaInicio: f.fechaInicio ? f.fechaInicio.value : "N/A",
